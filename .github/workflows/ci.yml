name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: skincare
          POSTGRES_PASSWORD: skincare
          POSTGRES_DB: skincare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skincare -d skincare_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://skincare:skincare@localhost:5432/skincare_test?schema=public
      JWT_SECRET: test-secret-for-ci-only
      JWT_EXPIRES_IN: 1h
      AUTH_PROVIDER: mock
      ALLOW_MOCK_AUTH: "true"
      DEFAULT_MARKET_CODE: TR
      DEFAULT_LOCALE: tr-TR
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run prisma:seed

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
